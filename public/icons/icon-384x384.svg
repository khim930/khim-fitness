<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 384" width="384" height="384">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e05c2a"/>
      <stop offset="100%" stop-color="#c44a1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="384" height="384" rx="69" fill="url(#bg)"/>
  <!-- Orange accent bar top -->
  <rect x="30" y="30" width="322" height="23" rx="11" fill="url(#accent)"/>
  <!-- Letter K -->
  <text x="192" y="176" font-family="Impact, Arial Black, sans-serif" font-weight="900"
    font-size="199" fill="white" text-anchor="middle" dominant-baseline="middle"
    letter-spacing="-2">K</text>
  <!-- Tagline text -->
  <text x="192" y="314" font-family="Arial, sans-serif" font-weight="700"
    font-size="49" fill="#e05c2a" text-anchor="middle" letter-spacing="3">FIT</text>
</svg>