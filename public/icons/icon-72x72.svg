<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e05c2a"/>
      <stop offset="100%" stop-color="#c44a1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="72" height="72" rx="12" fill="url(#bg)"/>
  <!-- Orange accent bar top -->
  <rect x="5" y="5" width="60" height="4" rx="2" fill="url(#accent)"/>
  <!-- Letter K -->
  <text x="36" y="33" font-family="Impact, Arial Black, sans-serif" font-weight="900"
    font-size="37" fill="white" text-anchor="middle" dominant-baseline="middle"
    letter-spacing="-2">K</text>
  <!-- Tagline text -->
  <text x="36" y="59" font-family="Arial, sans-serif" font-weight="700"
    font-size="9" fill="#e05c2a" text-anchor="middle" letter-spacing="3">FIT</text>
</svg>