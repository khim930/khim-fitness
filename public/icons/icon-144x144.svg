<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e05c2a"/>
      <stop offset="100%" stop-color="#c44a1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="144" height="144" rx="25" fill="url(#bg)"/>
  <!-- Orange accent bar top -->
  <rect x="11" y="11" width="120" height="8" rx="4" fill="url(#accent)"/>
  <!-- Letter K -->
  <text x="72" y="66" font-family="Impact, Arial Black, sans-serif" font-weight="900"
    font-size="74" fill="white" text-anchor="middle" dominant-baseline="middle"
    letter-spacing="-2">K</text>
  <!-- Tagline text -->
  <text x="72" y="118" font-family="Arial, sans-serif" font-weight="700"
    font-size="18" fill="#e05c2a" text-anchor="middle" letter-spacing="3">FIT</text>
</svg>