<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e05c2a"/>
      <stop offset="100%" stop-color="#c44a1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="23" fill="url(#bg)"/>
  <!-- Orange accent bar top -->
  <rect x="10" y="10" width="107" height="7" rx="3" fill="url(#accent)"/>
  <!-- Letter K -->
  <text x="64" y="58" font-family="Impact, Arial Black, sans-serif" font-weight="900"
    font-size="66" fill="white" text-anchor="middle" dominant-baseline="middle"
    letter-spacing="-2">K</text>
  <!-- Tagline text -->
  <text x="64" y="104" font-family="Arial, sans-serif" font-weight="700"
    font-size="16" fill="#e05c2a" text-anchor="middle" letter-spacing="3">FIT</text>
</svg>